<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="KANCHKART - Timeless Glass. Inspired Living.">
    <title>KANCHKART - Premium Glassware</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 98%;
            height: 98%;
            overflow: hidden;
        }

        body {
            font-family: 'Lato', sans-serif;
            color: #d4c5b9;
            line-height: 1.6;
            background: url('ChatGPT Image Jun 20, 2026, 08_59_26 PM.png') center/cover no-repeat fixed;
            min-height: 100vh;
        }

        /* Dark Overlay for text visibility */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            padding: 40px 20px;
        }

        .content {
            text-align: center;
            max-width: 600px;
            animation: fadeIn 1s ease forwards;
        }

        /* Brand Logo */
        .brand-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease forwards;
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            border: 2px solid #c9a87a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #c9a87a;
            position: relative;
        }

        .brand-icon::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #c9a87a;
            border-radius: 50%;
            top: 8px;
        }

        .brand-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            letter-spacing: 4px;
            color: #e8dcc8;
            font-weight: 600;
        }

        .brand-tagline {
            font-size: 12px;
            letter-spacing: 2px;
            color: #c9a87a;
            text-transform: uppercase;
        }

        /* Main Title */
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(48px, 10vw, 100px);
            font-weight: 700;
            color: #e8dcc8;
            line-height: 1.1;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.7);
            margin-bottom: 30px;
            animation: fadeInUp 1.2s ease 0.2s forwards;
            opacity: 0;
            letter-spacing: 2px;
        }

        /* Divider */
        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #c9a87a 50%, transparent 100%);
            margin: 30px auto;
            animation: fadeInUp 1.2s ease 0.3s forwards;
            opacity: 0;
        }

        /* Description */
        .description {
            font-size: 16px;
            color: #d4c5b9;
            line-height: 1.8;
            margin-bottom: 30px;
            animation: fadeInUp 1.2s ease 0.4s forwards;
            opacity: 0;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5);
        }

        .description strong {
            color: #c9a87a;
            font-weight: 600;
        }

        .description em {
            color: #e8dcc8;
            font-style: italic;
        }

        /* CTA Button */
        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 45px;
            border: 2px solid #c9a87a;
            color: #c9a87a;
            background: rgba(0, 0, 0, 0.3);
            text-decoration: none;
            font-family: 'Lato', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 30px;
            animation: fadeInUp 1.2s ease 0.5s forwards;
            opacity: 0;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .cta-button:hover {
            background: #c9a87a;
            color: #2f2d2a;
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(201, 168, 122, 0.5);
            border-color: #e8dcc8;
        }

        /* Values */
        .values-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 50px;
            animation: fadeInUp 1.2s ease 0.6s forwards;
            opacity: 0;
        }

        .value-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .value-icon {
            font-size: 28px;
            color: #c9a87a;
        }

        .value-title {
            font-size: 11px;
            letter-spacing: 1px;
            color: #e8dcc8;
            text-transform: uppercase;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        /* Bottom Text */
        .bottom-text {
            margin-top: 50px;
            font-size: 12px;
            letter-spacing: 2px;
            color: #c9a87a;
            text-transform: uppercase;
            animation: fadeInUp 1.2s ease 0.7s forwards;
            opacity: 0;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5);
        }

        /* Email Form */
        .email-section {
            margin-top: 40px;
            animation: fadeInUp 1.2s ease 0.8s forwards;
            opacity: 0;
        }

        .email-label {
            font-size: 12px;
            letter-spacing: 1px;
            color: #c9a87a;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .email-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .email-form input {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #c9a87a;
            color: #e8dcc8;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            border-radius: 4px;
            min-width: 250px;
            backdrop-filter: blur(5px);
        }

        .email-form input::placeholder {
            color: #9d8b79;
        }

        .email-form input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #e8dcc8;
        }

        .email-form button {
            padding: 12px 30px;
            background: #c9a87a;
            color: #2f2d2a;
            border: none;
            font-family: 'Lato', sans-serif;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .email-form button:hover {
            background: #e8dcc8;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(201, 168, 122, 0.4);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-title {
                font-size: 60px;
            }

            .values-section {
                grid-template-columns: repeat(2, 1fr);
                gap: 30px;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .main-title {
                font-size: 45px;
                margin-bottom: 20px;
            }

            .brand-name {
                font-size: 22px;
            }

            .description {
                font-size: 14px;
                margin-bottom: 20px;
            }

            .values-section {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                margin-top: 30px;
            }

            .value-icon {
                font-size: 24px;
            }

            .value-title {
                font-size: 10px;
            }

            .email-form input {
                min-width: 100%;
            }

            .cta-button {
                padding: 12px 35px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }

            .main-title {
                font-size: 32px;
                margin-bottom: 15px;
            }

            .brand-name {
                font-size: 18px;
            }

            .brand-tagline {
                font-size: 10px;
            }

            .description {
                font-size: 13px;
                margin-bottom: 15px;
            }

            .divider {
                margin: 20px auto;
            }

            .values-section {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                margin-top: 25px;
            }

            .value-icon {
                font-size: 20px;
            }

            .value-title {
                font-size: 9px;
            }

            .email-section {
                margin-top: 30px;
            }

            .email-form {
                gap: 8px;
            }

            .email-form input {
                min-width: 100%;
                padding: 10px 15px;
                font-size: 13px;
            }

            .email-form button {
                min-width: 100%;
                padding: 10px 20px;
            }

            .cta-button {
                padding: 10px 30px;
                font-size: 11px;
            }
        }

        /* Text Selection */
        ::selection {
            background: #c9a87a;
            color: #2f2d2a;
        }

        /* Font Smoothing */
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <!-- Brand -->
            <div class="brand-section">
                <div class="brand-icon"></div>
                <div class="brand-info">
                    <h1 class="brand-name">KANCHKART</h1>
                    <p class="brand-tagline">Timeless Glass. Inspired Living.</p>
                </div>
            </div>
            
            <!-- Divider -->
            <div class="divider"></div>

            <!-- Description -->
            <p class="description">
                Exquisite glassware & <strong>Kanch</strong><br>
                crafted for every <em>beautiful</em> moment.
            </p>

            <!-- Bottom Text -->
            <div class="bottom-text">BRINGING CLARITY TO YOUR WORLD</div>

            <!-- Email Signup -->
            <div class="email-section">
                <label class="email-label">Subscribe for Updates</label>
                <form class="email-form" onsubmit="handleSubmit(event)">
                    <input type="email" placeholder="Enter your email address" required>
                    <button type="submit">Notify Me</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Handle email submission
        function handleSubmit(event) {
            event.preventDefault();
            const button = event.target.querySelector('button');
            const input = event.target.querySelector('input');
            const originalText = button.textContent;
            
            button.textContent = '✓ Thank You!';
            button.style.background = '#e8dcc8';
            button.style.color = '#2f2d2a';
            
            setTimeout(() => {
                button.textContent = originalText;
                button.style.background = '';
                button.style.color = '';
                input.value = '';
            }, 3000);

            console.log('Email registered:', input.value);
        }
    </script>
</body>
</html>
